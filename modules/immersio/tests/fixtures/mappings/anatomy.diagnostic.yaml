metadata:
  semester: "2026-1"
  course_slug: anatomy
  course_name_kr: "인체구조와기능"
  mapping_version: 2

columns:
  - source: "학번"
    kind: identity

  # 8 quantitative axes (minimum-viable: ≥1 likert column per axis)
  - source: "Q_digital_efficacy"
    axis: digital_efficacy
    kind: likert
    aggregate: mean
  - source: "Q01_나는_의학에_관심이_많다"
    axis: motivation
    kind: likert
    aggregate: mean
  - source: "Q02_나는_간호사가_되고_싶다"
    axis: motivation
    kind: likert
    aggregate: mean
  - source: "Q_time_availability"
    axis: time_availability
    kind: likert
    aggregate: mean
  - source: "Q_material_preference"
    axis: material_preference
    kind: likert
    aggregate: mean
  - source: "Q_study_strategy"
    axis: study_strategy
    kind: likert
    aggregate: mean
  - source: "Q_study_environment"
    axis: study_environment
    kind: likert
    aggregate: mean
  - source: "Q_social_learning"
    axis: social_learning
    kind: likert
    aggregate: mean
  - source: "Q_feedback_seeking"
    axis: feedback_seeking
    kind: likert
    aggregate: mean

  # Auxiliary group (interest topics) — non-scoring
  - source: "Q11_관심있는_챕터"
    axis: interest_topics
    kind: multiselect

  # Freetext (anxiety area)
  - source: "Q62_시험에_대한_불안"
    axis: anxiety_freetext
    kind: freetext

axes:
  required:
    - digital_efficacy
    - motivation
    - time_availability
    - material_preference
    - study_strategy
    - study_environment
    - social_learning
    - feedback_seeking
  optional:
    - interest_topics
    - anxiety_freetext
