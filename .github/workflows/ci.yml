name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Pin ruff to the version the repo's rules were validated against so a
      # newer release introducing rules cannot turn CI red without a deliberate bump.
      - name: Ruff lint
        run: uvx ruff@0.15.11 check .

      - name: Ruff format check
        run: uvx ruff@0.15.11 format --check .

  test:
    name: pytest ${{ matrix.python-version }} (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        package:
          - examen
          - immersio
          - maieutica
          - needs-map
          - retro-mester
          - paideia_shared
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # immersio/needs-map fail fast unless NanumGothic Regular + Bold resolve via
      # fc-match (PDF/figure rendering). fonts-nanum provides both faces.
      - name: Install Korean fonts (NanumGothic)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-nanum
          sudo fc-cache -f

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      # Single venv for the whole workspace; the optional `roberta` extra (torch)
      # is intentionally left out — needs-map sentiment tests self-skip without it.
      - name: Sync workspace
        run: uv sync --all-packages

      # Scope pytest to one package's test tree (each module ships its own
      # top-level `tests` package, so collecting all at once collides).
      # `--no-sync` runs against the full --all-packages venv above; a
      # `uv run --package <x>` would re-resolve to that package's closure and
      # can yield a different (broken) dependency set than the verified full env.
      # paideia_shared lives under shared/; the modules under modules/.
      - name: Run tests
        run: |
          if [ "${{ matrix.package }}" = "paideia_shared" ]; then
            path="shared/paideia_shared/tests"
            cov="shared/paideia_shared/src"
          else
            path="modules/${{ matrix.package }}/tests"
            cov="modules/${{ matrix.package }}/src"
          fi
          uv run --no-sync pytest "$path" --cov="$cov" --cov-report=xml

      # Upload per-package coverage; flags keep the matrix legs separate on
      # Codecov. continue-on-error so a Codecov outage never reddens CI.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.package }}
          name: ${{ matrix.package }}-py${{ matrix.python-version }}
